site_name: az-rbac-watch
site_description: CLI for Azure RBAC drift detection, guardrails, and change tracking
repo_url: https://github.com/maxvanp/az-rbac-watch
theme:
  name: material
  palette:
    primary: blue
    accent: cyan
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Commands:
    - audit: commands/audit.md
    - scan: commands/scan.md
    - discover: commands/discover.md
    - validate: commands/validate.md
    - snapshot: commands/snapshot.md
    - diff: commands/diff.md
  - Policy Reference: policy-reference.md
  - Configuration: configuration.md
  - CI/CD Integration: ci-cd.md
  - Architecture: architecture.md
  - Contributing: contributing.md
plugins:
  - search
  - minify:
      minify_html: true
