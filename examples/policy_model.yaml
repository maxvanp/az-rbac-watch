# Azure Permissions Watch — Policy Model Example (v2.0)
# This file describes compliance rules for your Azure tenant.
#
# Two complementary axes:
#   - `az-rbac-watch scan`  → evaluates baseline rules → detects DRIFT
#   - `az-rbac-watch audit` → evaluates governance rules → detects VIOLATIONS
#
# Two types of rules:
#   - baseline    : defines your expected permissions architecture
#                   (any assignment not covered = DRIFT)
#   - governance  : defines what is forbidden
#                   (produces a GOVERNANCE_VIOLATION)
#
# Generate an initial draft with `az-rbac-watch discover`, then add governance rules manually.
#
# Scope modes:
#   scope: explicit  (default) — only scopes listed below are scanned
#   scope: all                 — auto-discovery of all accessible scopes
#   scope: all + exclude_subscriptions/exclude_management_groups — everything except certain scopes

version: "2.0"

# Entra ID tenant identifier
tenant_id: "00000000-0000-0000-0000-000000000000"  # Replace with your tenant ID

# Scope mode: "explicit" (default) or "all" (auto-discovery)
scope: explicit

# Subscriptions to scan
subscriptions:
  - id: "11111111-1111-1111-1111-111111111111"
    name: "Production"
  - id: "22222222-2222-2222-2222-222222222222"
    name: "Development"

# Management groups to scan (optional)
management_groups:
  - id: "mg-production"
    name: "Production"

rules:
  # ── Baseline rules — your expected permissions architecture ──────

  - name: infra-owners
    type: baseline
    description: "GRP-TEAM-INFRA-Owners — Owner on rg-infra"
    match:
      principal_id: "aaaaaaaa-aaaa-aaaa-aaaa-aaaaaaaaaaaa"
      role: Owner
      scope: /subscriptions/11111111-1111-1111-1111-111111111111/resourceGroups/rg-infra

  - name: infra-contributors
    type: baseline
    description: "GRP-TEAM-INFRA-Contributors — Contributor on rg-infra"
    match:
      principal_id: "bbbbbbbb-bbbb-bbbb-bbbb-bbbbbbbbbbbb"
      role: Contributor
      scope: /subscriptions/11111111-1111-1111-1111-111111111111/resourceGroups/rg-infra

  - name: infra-readers
    type: baseline
    description: "GRP-TEAM-INFRA-Readers — Reader on prod subscription"
    match:
      principal_id: "cccccccc-cccc-cccc-cccc-cccccccccccc"
      role: Reader
      scope: /subscriptions/11111111-1111-1111-1111-111111111111

  - name: github-actions-deploy
    type: baseline
    description: "sp-github-actions-deploy — Contributor on rg-app"
    match:
      principal_id: "dddddddd-dddd-dddd-dddd-dddddddddddd"
      role: Contributor
      scope: /subscriptions/11111111-1111-1111-1111-111111111111/resourceGroups/rg-app

  - name: dev-contributors
    type: baseline
    description: "GRP-TEAM-DEV-Contributors — Contributor on rg-app-dev"
    match:
      principal_id: "eeeeeeee-eeee-eeee-eeee-eeeeeeeeeeee"
      role: Contributor
      scope: /subscriptions/22222222-2222-2222-2222-222222222222/resourceGroups/rg-app-dev

  # ── Governance rules — what is forbidden ──────────────────

  # No Owner at subscription level
  - name: no-owner-at-subscription
    type: governance
    description: "Owner role is forbidden at subscription scope"
    severity: critical
    remediation: "Remove the Owner assignment or reduce the scope to a resource group"
    match:
      scope_prefix: /subscriptions/
      role: Owner

  # No direct assignment to users
  - name: no-direct-users
    type: governance
    description: "Users must go through groups"
    severity: high
    remediation: "Add the user to an Entra group and assign the role to the group"
    match:
      principal_type: User

  # Only Reader and Contributor allowed on dev RG
  - name: allowed-roles-dev
    type: governance
    description: "Only Reader and Contributor on dev RG"
    severity: high
    remediation: "Change the role to Reader or Contributor, or move the assignment to another scope"
    match:
      scope_prefix: /subscriptions/22222222-2222-2222-2222-222222222222/resourceGroups/rg-app-dev
      role_not_in:
        - Reader
        - Contributor

  # No custom roles in production
  - name: no-custom-roles-prod
    type: governance
    description: "Custom roles forbidden on prod subscription"
    severity: medium
    remediation: "Replace the custom role with a built-in role"
    match:
      scope_prefix: /subscriptions/11111111-1111-1111-1111-111111111111
      role_type: CustomRole

  # Service principals = no direct role
  - name: sp-require-group
    type: governance
    description: "Service principals must go through groups"
    severity: high
    remediation: "Add the service principal to an Entra group and assign the role to the group"
    match:
      principal_type: ServicePrincipal

  # Only GRP-PERM-* groups can have roles
  - name: only-permission-groups
    type: governance
    description: "Only GRP-PERM-* groups can have roles"
    severity: high
    remediation: "Rename the group with GRP-PERM-* prefix or create a new group"
    match:
      principal_type: Group
      principal_name_not_prefix: "GRP-PERM-"

  # Temporary groups forbidden
  - name: no-temp-groups
    type: governance
    description: "Groups containing TEMP are forbidden"
    severity: medium
    remediation: "Delete the temporary group and create a permanent group"
    match:
      principal_type: Group
      principal_name_contains: "TEMP"
