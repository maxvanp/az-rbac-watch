name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Type check
        run: mypy src/ tests/

      - name: Test with coverage
        run: pytest --cov=az_rbac_watch --cov-fail-under=80

      - name: Build package
        run: |
          pip install build hatch-vcs
          python -m build

      - name: Security audit
        run: |
          pip install pip-audit
          pip-audit
